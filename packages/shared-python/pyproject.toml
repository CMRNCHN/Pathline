[project]
name = "promptpath-shared"
version = "0.1.0"
description = "Shared utilities for PromptPath services"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27.0",
    "PyJWT>=2.8.0",
    "structlog>=24.0.0",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
