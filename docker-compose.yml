services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: api
        MODULE: promptpath_api.main:app
        PORT: 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/promptpath.db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-300}
      SESSION_PEPPER: ${SESSION_PEPPER:-dev-pepper-change-me}
      RETENTION_SECONDS: ${SESSION_RETENTION_SECONDS:-3600}
    volumes:
      - api_data:/app/data

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  asterisk:
    image: andrius/asterisk:18-current
    ports:
      - "${LAB_SIP_TLS_PORT:-5061}:5061/tcp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./lab/asterisk/extensions_lab.conf:/lab/extensions_lab.conf:ro
      - ./lab/asterisk/generated/pjsip.lab.conf:/lab/pjsip.lab.conf:ro
      - ./lab/asterisk/generated/tls:/etc/asterisk/keys:ro
      - ./lab/asterisk/entrypoint.sh:/lab/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/lab/entrypoint.sh"]
    environment:
      PUID: "1000"
      PGID: "1000"
    profiles:
      - lab

volumes:
  api_data:
