; Multi-step lab IVR for Pathline call script mapping
; Dial extension 1000

[lab-ivr]
exten => 1000,1,Answer()
 same => n,Wait(1)
 same => n,Playback(please-try-again-later)   ; placeholder pacing
 same => n,Goto(main-menu,s,1)

; ── Main menu ──────────────────────────────────
exten => main-menu,1,Playback(press-1)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(t)
 same => n,WaitExten(10)

exten => 1,1,Goto(touch-tone,s,1)

; ── Touch-tone switch ──────────────────────────
exten => touch-tone,1,Playback(vm-press)
 same => n,SayNumber(9)
 same => n,Playback(for)
 same => n,SayPhonetic(t)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(h)
 same => n,SayPhonetic(t)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(e)
 same => n,WaitExten(10)

exten => 9,1,Goto(pin-entry,s,1)

; ── PIN entry ──────────────────────────────────
exten => pin-entry,1,Playback(vm-enter-num)
 same => n,SayPhonetic(p)
 same => n,SayPhonetic(i)
 same => n,SayPhonetic(n)
 same => n,Read(pin,,4,,,5)
 same => n,Goto(ssn-entry,s,1)

; ── SSN last 4 ─────────────────────────────────
exten => ssn-entry,1,Playback(vm-enter-num)
 same => n,SayNumber(4)
 same => n,Read(ssn,,4,,,5)
 same => n,Goto(status-menu,s,1)

; ── Status menu ────────────────────────────────
exten => status-menu,1,Playback(press-1)
 same => n,Playback(for)
 same => n,SayPhonetic(b)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(e)
 same => n,WaitExten(10)

exten => 1,1,Goto(read-status,s,1)

; ── Status readout ─────────────────────────────
exten => read-status,1,SayPhonetic(y)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(r)
 same => n,Playback(dollars)
 same => n,SayNumber(1234)
 same => n,SayPhonetic(d)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(r)
 same => n,SayPhonetic(s)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()
