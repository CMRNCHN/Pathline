; Multi-step lab IVR for Pathline call script mapping
; Dial extension 1000 (or any number — catch-all routes to the same IVR)
; Background() accepts DTMF during prompts (needed for live injector timing).

[lab-ivr]
exten => 1000,1,Answer()
 same => n,MixMonitor(/lab/recordings/${STRFTIME(${EPOCH},,%Y%m%dT%H%M%S)}-lab-call.wav)
 same => n,Wait(1)
 same => n,Playback(please-try-again)
 same => n,Goto(lab-main-menu,s,1)

exten => _X.,1,Goto(1000,1)
exten => _+X.,1,Goto(1000,1)

; ── Main menu ──────────────────────────────────
[lab-main-menu]
exten => s,1,Background(if-correct-press)
 same => n,SayNumber(1)
 same => n,Background(activated)
 same => n,WaitExten(8)

exten => 1,1,Goto(lab-touch-tone,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── Touch-tone switch ──────────────────────────
[lab-touch-tone]
exten => s,1,Background(if-correct-press)
 same => n,SayNumber(9)
 same => n,WaitExten(8)

exten => 9,1,Goto(lab-pin-entry,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── PIN entry ──────────────────────────────────
[lab-pin-entry]
exten => s,1,Playback(vm-enter-num-to-call)
 same => n,Read(pin,,4,,,8)
 same => n,Goto(lab-ssn-entry,s,1)

; ── SSN last 4 ─────────────────────────────────
[lab-ssn-entry]
exten => s,1,Playback(vm-enter-num-to-call)
 same => n,SayNumber(4)
 same => n,Read(ssn,,4,,,8)
 same => n,Goto(lab-status-menu,s,1)

; ── Status menu ────────────────────────────────
[lab-status-menu]
exten => s,1,Background(if-correct-press)
 same => n,SayNumber(1)
 same => n,WaitExten(8)

exten => 1,1,Goto(lab-read-status,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── Status readout ─────────────────────────────
[lab-read-status]
exten => s,1,SayNumber(1234)
 same => n,Playback(goodbye)
 same => n,Hangup()
