; Multi-step lab IVR for Pathline call script mapping
; Dial extension 1000

[lab-ivr]
exten => 1000,1,Answer()
 same => n,Wait(1)
 same => n,Playback(please-try-again-later)   ; placeholder pacing
 same => n,Goto(lab-main-menu,s,1)

; ── Main menu ──────────────────────────────────
[lab-main-menu]
exten => s,1,Playback(press-1)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(t)
 same => n,WaitExten(10)

exten => 1,1,Goto(lab-touch-tone,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── Touch-tone switch ──────────────────────────
[lab-touch-tone]
exten => s,1,Playback(vm-press)
 same => n,SayNumber(9)
 same => n,Playback(for)
 same => n,SayPhonetic(t)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(h)
 same => n,SayPhonetic(t)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(e)
 same => n,WaitExten(10)

exten => 9,1,Goto(lab-pin-entry,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── PIN entry ──────────────────────────────────
[lab-pin-entry]
exten => s,1,Playback(vm-enter-num)
 same => n,SayPhonetic(p)
 same => n,SayPhonetic(i)
 same => n,SayPhonetic(n)
 same => n,Read(pin,,4,,,5)
 same => n,Goto(lab-ssn-entry,s,1)

; ── SSN last 4 ─────────────────────────────────
[lab-ssn-entry]
exten => s,1,Playback(vm-enter-num)
 same => n,SayNumber(4)
 same => n,Read(ssn,,4,,,5)
 same => n,Goto(lab-status-menu,s,1)

; ── Status menu ────────────────────────────────
[lab-status-menu]
exten => s,1,Playback(press-1)
 same => n,Playback(for)
 same => n,SayPhonetic(b)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(n)
 same => n,SayPhonetic(c)
 same => n,SayPhonetic(e)
 same => n,WaitExten(10)

exten => 1,1,Goto(lab-read-status,s,1)
exten => i,1,Goto(s,1)
exten => t,1,Goto(s,1)

; ── Status readout ─────────────────────────────
[lab-read-status]
exten => s,1,SayPhonetic(y)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(u)
 same => n,SayPhonetic(r)
 same => n,Playback(dollars)
 same => n,SayNumber(1234)
 same => n,SayPhonetic(d)
 same => n,SayPhonetic(o)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(l)
 same => n,SayPhonetic(a)
 same => n,SayPhonetic(r)
 same => n,SayPhonetic(s)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()
