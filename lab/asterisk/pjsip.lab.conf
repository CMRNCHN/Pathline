
; PromptPath lab — register a softphone as user "lab" / password "lab"
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[lab-user-aor]
type=aor
max_contacts=5
remove_existing=yes

[lab-user-auth]
type=auth
auth_type=userpass
username=lab
password=lab

[lab-user]
type=endpoint
context=lab-ivr
disallow=all
allow=ulaw,alaw
auth=lab-user-auth
aors=lab-user-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
