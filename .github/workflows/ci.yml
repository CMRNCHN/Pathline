name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: pip
                  cache-dependency-path: pyproject.toml

            - name: Show environment
              run: |
                set -euo pipefail
                python --version
                pwd
                ls -la

            - name: Install package and tooling
              run: |
                set -euo pipefail
                python -m pip install --upgrade pip
                pip install -e ".[interactive,dev]"

            - name: Run tests
              run: |
                set -euo pipefail
                python -m pytest -q

            - name: Lint
              run: |
                set -euo pipefail
                ruff check runtime replay analyst agents infrastructure tests