[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── Test SIP endpoint (used by test harness) ──────────────────────────────────

[pathline-test]
type=endpoint
context=ivr-test
disallow=all
allow=ulaw
allow=alaw
auth=pathline-test-auth
aors=pathline-test-aor
dtmf_mode=rfc4733

[pathline-test-auth]
type=auth
auth_type=userpass
username=pathline
password=pathline-test-secret

[pathline-test-aor]
type=aor
max_contacts=1
remove_existing=yes

; ── IVR extension (the "phone number" the test calls) ─────────────────────────

[ivr-endpoint]
type=endpoint
context=ivr-test
disallow=all
allow=ulaw
allow=alaw
aors=ivr-aor
dtmf_mode=rfc4733

[ivr-aor]
type=aor
max_contacts=1
