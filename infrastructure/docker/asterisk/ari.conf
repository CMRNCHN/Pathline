; ── Asterisk REST Interface (ARI) ─────────────────────────────────────────────
; Pathline Pulse drives calls through ARI, not AMI. The user/pass below matches
; Pulse's default PULSE_ARI_API_KEY ("ari:ari"); override that env var if you
; change these. ARI requires http.conf to have the HTTP server enabled.
[general]
enabled = yes
pretty = yes

[ari]
type = user
read_only = no
password = ari
password_format = plain
