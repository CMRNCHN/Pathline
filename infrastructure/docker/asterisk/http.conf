; ── ARI/HTTP server ───────────────────────────────────────────────────────────
; Enables the HTTP transport that Asterisk REST Interface (ARI) and its event
; WebSocket ride on. Pathline Pulse connects here (ws://host:8088/ari/events and
; POST http://host:8088/ari/channels/...). This is additive to the AMI control
; plane (manager.conf, port 5038) the Python test harness uses — both run side
; by side.
[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088
