; ── Pathline test IVR ─────────────────────────────────────────────────────────
;
; Call flow:
;   Answer → main menu
;     1 → "System OK"           → hangup
;     2 → echo digit mode       → hangup after one echo
;     9 → clean hangup
;     other → reprompt once     → hangup
;
; Extension 1000 = IVR entry point
; ─────────────────────────────────────────────────────────────────────────────

[ivr-test]

; ── Entry point ───────────────────────────────────────────────────────────────
exten => 1000,1,Answer()
 same => n,Wait(1)
 same => n,Set(REPROMPT=0)
 same => n,Goto(menu,1)

; ── Main menu ─────────────────────────────────────────────────────────────────
exten => menu,1,SayDigits(1)        ; "Press 1 for status"
 same => n,Background(silence/1)
 same => n,SayDigits(2)             ; "Press 2 for echo test"
 same => n,Background(silence/1)
 same => n,SayDigits(9)             ; "Press 9 to hang up"
 same => n,WaitExten(5)

; ── DTMF branches ─────────────────────────────────────────────────────────────
exten => 1,1,SayAlpha(SYSTEMOK)
 same => n,Hangup()

exten => 2,1,Read(ECHOED_DIGIT,silence/1,1)
 same => n,SayDigits(${ECHOED_DIGIT})
 same => n,Hangup()

exten => 9,1,Hangup()

; ── Timeout / invalid ─────────────────────────────────────────────────────────
exten => t,1,GotoIf($[${REPROMPT} >= 1]?hangup,1)
 same => n,Set(REPROMPT=1)
 same => n,SayAlpha(INVALIDINPUT)
 same => n,Goto(menu,1)

exten => i,1,GotoIf($[${REPROMPT} >= 1]?hangup,1)
 same => n,Set(REPROMPT=1)
 same => n,SayAlpha(INVALIDINPUT)
 same => n,Goto(menu,1)

exten => hangup,1,Hangup()
